name: Validate Story Files

on:
  push:
    branches: [main, v2-dev]
    paths:
      - '**/*.story.json'
      - '**/Samples~/**/*.json'
      - '.github/workflows/validate-stories.yml'
      - 'tools/validate_stories.py'
  pull_request:
    branches: [main, v2-dev]
    paths:
      - '**/*.story.json'
      - '**/Samples~/**/*.json'

jobs:
  validate:
    name: Validate Story JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run story validator
        run: python tools/validate_stories.py

      - name: Run demo dry run
        run: python run_demo.py
        env:
          PYTHONUNBUFFERED: '1'
