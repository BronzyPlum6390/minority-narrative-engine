name: Unity License Activation

# Run this workflow ONCE to get your Unity license.
# After activation is complete, delete this workflow or leave it — it won't run again unless triggered.

on:
  workflow_dispatch: {}

jobs:
  activation:
    name: Request Unity License File
    runs-on: ubuntu-latest
    steps:
      - name: Request Unity activation file (.alf)
        id: getalf
        uses: game-ci/unity-request-activation-file@v2

      - name: Upload Unity activation file as artifact
        uses: actions/upload-artifact@v3
        with:
          name: Unity_v${{ steps.getalf.outputs.unityVersion }}.alf
          path: ${{ steps.getalf.outputs.filePath }}
          retention-days: 1
