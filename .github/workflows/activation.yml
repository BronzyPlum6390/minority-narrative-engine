name: Unity License Activation

# This workflow is no longer needed for Unity Personal licenses.
# game-ci v4+ handles authentication automatically with just
# UNITY_EMAIL and UNITY_PASSWORD secrets.
#
# For Unity Pro, follow: https://game.ci/docs/github/activation
#
# This file can be deleted.

on:
  workflow_dispatch: {}

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Activation info
        run: |
          echo "For Unity Personal (free), no manual activation needed."
          echo "Just set UNITY_EMAIL and UNITY_PASSWORD in repo secrets."
          echo "See: https://game.ci/docs/github/activation"
